<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 520 90" width="520" height="90">
  <!-- CIS Logo -->
  <image href="data:image/png;base64," x="0" y="5" width="290" height="80"/>
  <!-- Vertical bar -->
  <line x1="305" y1="10" x2="305" y2="80" stroke="#999999" stroke-width="1.5"/>
  <!-- U.S. Congress text — Garamond is the typeface used in official Congressional documents -->
  <text x="320" y="52" font-family="Garamond, 'EB Garamond', Georgia, serif" font-size="22" font-weight="normal" fill="#1B3A5C" letter-spacing="1">U.S. Congress</text>
</svg>
